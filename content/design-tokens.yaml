# Brandy brand system. Edit brief/seeds here, then run npm run sync:sources.
schema_version: 2
brand_brief:
  name: "Brandy"
  category: "Brand surface testing tool"
  description: "A browser-native system for turning expressive brand seeds into launch-ready surfaces."
  strategy:
    positioning: "The visual control layer for modular landing page systems."
    promise: "Make brand feedback precise, fast, and implementation-ready."
  personality:
    traits:
      - "sharp"
      - "useful"
      - "systematic"
      - "brand-aware"
  voice:
    headline_style: "clear_punchy"
    sentence_style: "short_direct"
    vocabulary:
      - "brand surfaces"
      - "tokens"
      - "sections"
      - "ship"
  imagery:
    style: "annotated_interface_screenshots"
    texture: "clean"
    icon_style: "rounded_stroke"
    illustration_style: "diagrammatic"
  motion:
    personality: "snappy"
    intensity: "medium"
    hover_style: "lift"
    reveal_style: "quick_reveal"
creative_seeds:
  color:
    primary: "#38ac69"
    secondary: "#416aa6"
    accent: "#a33160"
    highlight: "#ccd4ac"
  color_derivation:
    backgroundDistancePercent: 100
    borderDistancePercent: 100
    buttonPrimaryBgDistancePercent: 100
    buttonSecondaryBorderDistancePercent: 100
    buttonSecondaryHoverDistancePercent: 100
    linkColorDistancePercent: 100
    linkHoverDistancePercent: 100
    primaryHoverDistancePercent: 100
    secondarySurfaceDistancePercent: 100
    accentMomentDistancePercent: 100
    highlightSoftDistancePercent: 100
    neutralSurfaceDistancePercent: 100
    readableTextDistancePercent: 100
    secondaryTextDistancePercent: 100
  typography:
    style: "humanist"
    pairing: "display_plus_text"
    primaryFont: "manrope"
    secondaryFont: "karla"
    scale: 71
    density: 74
    weight: 46
    headlineStyle: 53
    tightness: 34
  layout:
    spacing: 50
    radius: 0
    width: "narrow"
    pageGutter: 50
    heroScale: "immersive"
    heroBalance: 35
    textWidth: 52
    gridDensity: "balanced"
